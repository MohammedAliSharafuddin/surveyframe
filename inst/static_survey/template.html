<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{SURVEY_TITLE}}</title>
<style>
:root{
  --cp:{{THEME_COLOR}};
  /* Theme B: every tint and shade derives from the single theme colour, so
     the builder's one colour selector re-skins the whole survey. */
  --tint:color-mix(in srgb,var(--cp) 8%,#ffffff);
  --tint-bd:color-mix(in srgb,var(--cp) 30%,#dbe3e6);
  --deep:color-mix(in srgb,var(--cp) 78%,#0c1a1a);
  --cf:#ffffff;--cg:#fbfdfd;--cb:#dfe7ea;
  --t1:#12212b;--t2:#51636f;--t3:#9ab0ba;
  --cd:#dc2626;--cs:#16a34a;
  --font:system-ui,-apple-system,"Segoe UI",sans-serif;
  --serif:Georgia,'Times New Roman',serif;
  --r:8px;--card-w:660px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--cg);font-family:var(--font);font-size:15px;color:var(--t1);line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea,select{font-family:inherit;font-size:15px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* Header (Fix A) */
.sf-hdr{display:flex;align-items:center;gap:12px;max-width:var(--card-w);margin:18px auto 0;padding:0 18px 14px;border-bottom:1px solid var(--cb)}
.sf-hdr-logo{height:44px;width:auto;min-width:44px;max-width:200px;object-fit:contain;object-position:left center}
.sf-hdr-inst{font-size:13px;font-weight:650;color:var(--t2);letter-spacing:.5px;text-transform:uppercase}

/* Progress */
.prog-bar-wrap{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--cg) 92%,transparent);backdrop-filter:blur(4px);border-bottom:1px solid var(--cb);padding:0}
.prog-bar-inner{height:3px;background:var(--cp);transition:width .3s ease;min-width:0}
.prog-hdr{display:flex;align-items:center;gap:10px;padding:9px 20px}
.prog-title{font-size:13px;font-weight:600;color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-pct{font-size:12.5px;color:var(--t2);flex-shrink:0}

/* Layout */
.frame{max-width:var(--card-w);margin:0 auto;padding:30px 18px 60px}
.card{background:transparent;border-radius:0;box-shadow:none;overflow:visible}
.card-body{padding:14px 4px}

/* Welcome / thankyou */
.wl-title{font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.2px;margin-bottom:10px}
.wl-intro{color:var(--t2);margin-bottom:22px;white-space:pre-wrap;font-size:16px}
.consent-box{background:var(--tint);border:1px solid var(--tint-bd);border-radius:6px;padding:14px 16px;font-size:14px;color:var(--deep);margin-bottom:16px;white-space:pre-wrap}
.consent-chk{display:flex;align-items:flex-start;gap:9px;font-size:14px;margin-bottom:20px;cursor:pointer}
.consent-chk input{margin-top:3px;accent-color:var(--cp);width:17px;height:17px}
.ty-ic{font-size:52px;text-align:center;margin-bottom:14px;color:var(--cp)}
.ty-title{font-family:var(--serif);font-size:27px;font-weight:500;text-align:center;margin-bottom:8px}
.ty-msg{color:var(--t2);text-align:center;font-size:15px;margin-bottom:22px;white-space:pre-wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 28px;min-height:48px;border-radius:6px;font-size:15px;font-weight:650;
  transition:all .15s;border:1.5px solid transparent;cursor:pointer}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--cp);color:#fff;border-color:var(--cp)}
.btn-p:hover:not(:disabled){background:var(--deep);border-color:var(--deep)}
.btn-s{background:var(--cf);color:var(--t2);border-color:var(--cb)}
.btn-s:hover:not(:disabled){border-color:var(--tint-bd);background:var(--tint)}
.btn-lg{padding:13px 30px;font-size:16px;width:100%;margin-top:24px}
.nav-row{display:flex;gap:10px;margin-top:30px}
.nav-row .sp{flex:1}

/* Section / text block */
.sec-div{margin:34px 0 22px;padding-top:20px;position:relative}
.sec-div::before{content:"";position:absolute;top:0;left:0;width:44px;height:2px;background:var(--cp)}
.sec-title{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.2px}
.sec-sub{color:var(--t2);font-size:14px;margin-top:5px;white-space:pre-wrap;font-style:italic}
.txt-blk{background:var(--tint);border-left:3px solid var(--cp);border-radius:0 6px 6px 0;
  padding:12px 16px;margin:14px 0;font-size:14px;color:var(--deep);white-space:pre-wrap}

/* Items */
.item{margin-bottom:32px}
.item.hidden{display:none}
.blk.hidden{display:none}
.item-q{font-family:var(--serif);font-weight:500;margin-bottom:8px;display:flex;gap:7px;
  font-size:19px;line-height:1.45;letter-spacing:-.1px}
.mode-conversational .item-q{font-size:25px}
.req-mk{color:var(--cp);font-size:13px;margin-top:2px;flex-shrink:0}
.item-help{font-size:14px;color:var(--t2);margin-bottom:10px;margin-top:-2px;font-style:italic}
.item-err{font-size:13px;color:var(--cd);margin-top:6px;display:none}
.item-err.show{display:block}
.q-eyebrow{font-size:13px;color:var(--cp);margin-bottom:10px;font-weight:600}

/* Focus visibility: hidden native inputs surface focus on their card */
.choice-opt:has(input:focus-visible),
.likert-opt:has(input:focus-visible){outline:3px solid var(--deep);outline-offset:2px}
.btn:focus-visible,.star-btn:focus-visible,.rank-mv:focus-visible,
.inp-std:focus-visible,.slider-inp:focus-visible,
.matrix-tbl input:focus-visible,.consent-chk input:focus-visible{
  outline:3px solid var(--deep);outline-offset:2px}

/* Likert: numbered square buttons with tiny labels, single-colour theme */
.likert-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:2px}
.likert-opt{flex:1;min-width:56px;display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:10px 4px;min-height:58px;border:1px solid var(--cb);border-radius:6px;
  background:var(--cf);cursor:pointer;transition:all .12s;text-align:center;
  box-shadow:0 1px 0 rgba(18,33,43,.03)}
.likert-opt:hover{border-color:var(--cp);background:var(--tint)}
.likert-opt:has(input:checked){background:var(--cp);border-color:var(--cp)}
.likert-opt input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.likert-num{font-size:18px;font-weight:600;color:var(--t2);line-height:1.2}
.likert-opt:has(input:checked) .likert-num{color:#fff}
.likert-lbl{font-size:11px;color:var(--t2);line-height:1.25;max-width:76px}
.likert-opt:has(input:checked) .likert-lbl{color:color-mix(in srgb,#ffffff 82%,var(--cp))}

/* Choice: bordered option cards with key chips and a tick */
.choice-list{display:flex;flex-direction:column;gap:9px;counter-reset:opt}
.choice-opt{display:flex;align-items:center;gap:12px;padding:12px 15px;min-height:50px;
  border:1px solid var(--cb);border-radius:6px;background:var(--cf);cursor:pointer;
  transition:all .12s;font-size:15.5px;box-shadow:0 1px 0 rgba(18,33,43,.03);counter-increment:opt}
.choice-opt::before{content:counter(opt,upper-alpha);width:26px;height:26px;flex-shrink:0;
  border:1px solid var(--cb);border-radius:4px;background:var(--cf);display:flex;
  align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2)}
.choice-opt:hover{border-color:var(--cp);background:var(--tint)}
.choice-opt:has(input:checked){border-color:var(--cp);background:var(--tint);
  box-shadow:inset 0 0 0 1px var(--cp)}
.choice-opt:has(input:checked)::before{background:var(--cp);border-color:var(--cp);color:#fff}
.choice-opt::after{content:"\2713";margin-left:auto;color:var(--cp);font-weight:700;visibility:hidden}
.choice-opt:has(input:checked)::after{visibility:visible}
.choice-opt input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}

/* Short text / number / date: editorial underline inputs */
.inp-std{width:100%;border:none;border-bottom:2px solid var(--cb);border-radius:0;
  padding:8px 2px;font-size:18px;font-family:var(--serif);color:var(--t1);background:transparent;
  transition:border-color .15s}
.inp-std::placeholder{color:color-mix(in srgb,var(--t3) 72%,#ffffff)}
.inp-std:focus{outline:none;border-bottom-color:var(--cp);box-shadow:none}
textarea.inp-std{resize:vertical;min-height:88px;border:1px solid var(--cb);border-radius:6px;
  padding:12px 14px;font-size:15.5px;background:var(--cf)}
textarea.inp-std:focus{border-color:var(--cp);box-shadow:0 0 0 3px color-mix(in srgb,var(--cp) 13%,transparent)}
.inp-narrow{max-width:220px}

/* Slider */
.slider-wrap{display:flex;flex-direction:column;gap:8px;border:1px solid var(--cb);
  border-radius:6px;background:var(--cf);padding:16px 18px;
  box-shadow:0 1px 0 rgba(18,33,43,.03)}
.slider-inp{width:100%;accent-color:var(--cp);height:24px;cursor:pointer}
.slider-inp::-webkit-slider-thumb{width:24px;height:24px}
.slider-inp::-moz-range-thumb{width:22px;height:22px}
.slider-lbls{display:flex;justify-content:space-between;font-size:12.5px;color:var(--t2)}
.slider-val{font-size:22px;font-weight:600;font-family:var(--serif);color:var(--cp);text-align:center}

/* Rating */
.star-row{display:flex;gap:10px}
.star-btn{font-size:36px;background:none;border:none;cursor:pointer;
  color:color-mix(in srgb,var(--cb) 80%,#ffffff);transition:color .12s,transform .1s;line-height:1}
.star-btn:hover{transform:scale(1.1)}
.star-btn.active{color:var(--cp)}

/* Matrix: horizontal rules only, theme accents, no vertical grid */
.matrix-wrap{overflow-x:auto;margin-top:8px;border:1px solid var(--cb);
  border-radius:6px;background:var(--cf);box-shadow:0 1px 0 rgba(18,33,43,.03)}
.matrix-tbl{width:100%;border-collapse:collapse;font-size:13px}
.matrix-tbl th{background:var(--tint);padding:10px 12px;text-align:center;
  border-bottom:1.5px solid var(--tint-bd);font-weight:650;color:var(--t2);
  vertical-align:bottom;font-size:12px}
.matrix-tbl td{padding:11px 12px;border-bottom:1px solid var(--cb);
  text-align:center;vertical-align:middle}
.matrix-tbl tr:last-child td{border-bottom:none}
.matrix-tbl .rl{text-align:left;font-weight:500;color:var(--t1)}
.matrix-tbl input{accent-color:var(--cp);width:24px;height:24px}
.matrix-tbl tbody tr:hover td{background:var(--tint)}

/* Ranking: option-card rows matching the choice cards */
.rank-list{display:flex;flex-direction:column;gap:9px}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 15px;min-height:50px;
  background:var(--cf);border:1px solid var(--cb);border-radius:6px;cursor:grab;
  user-select:none;transition:all .12s;box-shadow:0 1px 0 rgba(18,33,43,.03)}
.rank-item:hover{border-color:var(--cp);background:var(--tint)}
.rank-item.drag-over{border-top:2px solid var(--cp)}
.rank-item.dragging{opacity:.4}
.rank-num{width:26px;height:26px;border-radius:6px;background:var(--cp);
  color:#fff;font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-handle{color:var(--t3);font-size:14px;flex-shrink:0;cursor:grab}
.rank-lbl{flex:1;font-size:15px}
.rank-kbd{display:flex;gap:4px;flex-shrink:0}
.rank-mv{width:30px;height:30px;border-radius:6px;border:1px solid var(--cb);
  background:var(--cf);color:var(--t2);font-size:11px;display:flex;
  align-items:center;justify-content:center;cursor:pointer}
.rank-mv:hover{border-color:var(--cp);color:var(--cp);background:var(--tint)}

/* Error banner */
.err-banner{background:#fef2f2;border:1.5px solid #fecaca;border-radius:8px;
  padding:12px 16px;margin-bottom:18px;font-size:13px;color:#991b1b;display:none}
.err-banner.show{display:block}

/* Footer */
.sf-footer{text-align:center;font-size:12px;color:var(--t2);padding:8px 16px 36px}
.sf-footer a{color:var(--t2);font-weight:600;text-decoration:underline}
.sf-footer a:hover{text-decoration:underline}

/* Mobile */
@media (max-width:600px){
  .card-body{padding:10px 2px}
  .frame{padding:20px 14px 48px}
  .sf-hdr{margin-top:14px;padding-bottom:12px}
  .wl-title{font-size:25px}
  .item-q{font-size:17.5px}
  .mode-conversational .item-q{font-size:22px}
  .star-btn{font-size:31px}
  .prog-hdr{padding:9px 14px}
  .btn{padding:10px 20px}
  .likert-opt{min-width:50px}
}
</style>
</head>
<body data-endpoint="{{ENDPOINT_URL}}">

<!-- Fix A: header region reads R.header for logo and institution -->
<div id="sf-hdr" class="sf-hdr" style="display:none"></div>

<div id="prog-bar-wrap" class="prog-bar-wrap" hidden>
  <div class="prog-bar-inner" id="progBar" style="width:0%"></div>
  <div class="prog-hdr">
    <span class="prog-title" id="progTitle"></span>
    <span class="prog-pct" id="progPct">0%</span>
  </div>
</div>

<div class="frame" id="app"></div>
<div class="sf-footer">Built with <a href="https://cran.r-project.org/package=surveyframe" target="_blank" rel="noopener">surveyframe</a></div>

<script type="application/json" id="sf-data">{{INSTRUMENT_JSON}}</script>
<script>
'use strict';
const SF       = JSON.parse(document.getElementById('sf-data').textContent);
const R        = (SF.render||{});
const THEME    = R.theme||'{{THEME_COLOR}}'||'#2563eb';
const ENDPOINT = document.body.dataset.endpoint||'';
const MODE     = R.mode||'standard';
const WL       = R.welcome||{};
const TY       = R.thankyou||{};

// Apply theme color
document.documentElement.style.setProperty('--cp', THEME);
document.body.classList.add('mode-'+MODE);

// Fix A: render header (logo + institution) from R.header
(function(){
  var hdr=R.header||{};
  var b64=hdr.logo_base64||'';
  var inst=hdr.institution||'';
  if(!b64&&!inst)return;
  // Fix E/F: use stored media type; default to image/png for backward compat
  var mtype=hdr.logo_media_type||'image/png';
  var el=document.getElementById('sf-hdr');
  if(!el)return;
  var html='';
  if(b64)html+='<img class="sf-hdr-logo" src="data:'+mtype+';base64,'+b64+'" alt="Logo">';
  if(inst)html+='<span class="sf-hdr-inst">'+inst.replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];})+'</span>';
  el.innerHTML=html;
  el.style.display='flex';
})();

// ── Lookups ────────────────────────────────────────────────────────────────
const choiceMap={};
(SF.choices||[]).forEach(function(cs){choiceMap[cs.id]=cs;});

const branchMap={};
(SF.branching||[]).forEach(function(rule){
  (branchMap[rule.item_id]=branchMap[rule.item_id]||[]).push(rule);
});

// Items designated as quality checks render as Likert (inline radio) so
// their choice layout matches regular scale items visually.
const checkItemIds=new Set();
(SF.checks||[]).forEach(function(ck){if(ck.item_id)checkItemIds.add(ck.item_id);});

// ── Response state ─────────────────────────────────────────────────────────
const responses={};
const startedAt=new Date().toISOString();
const respId='R'+Math.random().toString(36).slice(2,10).toUpperCase();
let screen='welcome';
let currentPage=1;
let rankOrders={};
let starValues={};

// ── Page builder ───────────────────────────────────────────────────────────
function buildPages(){
  if(MODE==='conversational'){
    return SF.items.map(function(i){return[i];});
  }
  var pagesMap={};
  SF.items.forEach(function(item){
    var p=item.page||1;
    if(!pagesMap[p])pagesMap[p]=[];
    pagesMap[p].push(item);
  });
  var keys=Object.keys(pagesMap).map(Number).sort(function(a,b){return a-b;});
  if(!keys.length)return[SF.items];
  return keys.map(function(k){return pagesMap[k];});
}
const pages=buildPages();
const maxPage=pages.length;

// ── Branching ──────────────────────────────────────────────────────────────
function evaluate(op,actual,value){
  if(actual===null||actual===undefined||actual==='')return false;
  var an=parseFloat(actual),vn=parseFloat(value);
  switch(op){
    case'==':return String(actual)===String(value);
    case'!=':return String(actual)!==String(value);
    case'%in%':return value.split(',').map(function(s){return s.trim();}).includes(String(actual));
    case'>': return !isNaN(an)&&!isNaN(vn)&&an>vn;
    case'>=':return !isNaN(an)&&!isNaN(vn)&&an>=vn;
    case'<': return !isNaN(an)&&!isNaN(vn)&&an<vn;
    case'<=':return !isNaN(an)&&!isNaN(vn)&&an<=vn;
    default:return false;
  }
}
function isVisible(itemId,seen){
  var rules=branchMap[itemId];
  if(!rules||!rules.length)return true;
  // Guard against rule cycles: a repeated item is treated as visible so the
  // walk terminates instead of recursing forever.
  seen=seen||{};
  if(seen[itemId])return true;
  seen[itemId]=true;
  // Several rules on one item combine with AND. A hidden controlling item
  // counts as unanswered so visibility cascades down the chain.
  for(var k=0;k<rules.length;k++){
    var rule=rules[k];
    var actual=isVisible(rule.depends_on,seen)?responses[rule.depends_on]:'';
    var cond=evaluate(rule.operator,actual,rule.value);
    if(!(rule.action==='show'?cond:!cond))return false;
  }
  return true;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function h(tag,attrs,inner){return'<'+tag+' '+(attrs||'')+'>'+inner+'</'+tag+'>';}
function wrapItem(item,inner){
  return'<div class="item'+(isVisible(item.id)?'':' hidden')+'" id="item_'+esc(item.id)+'" data-id="'+esc(item.id)+'">'
    +'<div class="item-q" id="q_'+esc(item.id)+'">'+esc(item.label)
    +(item.required?'<span class="req-mk" aria-hidden="true">*</span><span class="sr">(required)</span>':'')+'</div>'
    +(item.help?'<div class="item-help" id="help_'+esc(item.id)+'">'+esc(item.help)+'</div>':'')
    +inner
    +'<div class="item-err" id="err_'+esc(item.id)+'" role="alert">This question is required.</div>'
    +'</div>';
}
// Accessible-name attributes for inputs that sit outside a label element:
// the question text div carries id q_<item>, referenced from the control.
function ariaFor(item){
  return' aria-labelledby="q_'+esc(item.id)+'"'
    +(item.help?' aria-describedby="help_'+esc(item.id)+'"':'')
    +(item.required?' aria-required="true"':'');
}

// ── Renderers ──────────────────────────────────────────────────────────────
function renderItem(item){
  var t=item.type;
  var cs=choiceMap[item.choice_set||'']||{values:[],labels:[]};
  if(t==='section_break') return renderSection(item);
  if(t==='text_block')    return renderTextBlock(item);
  // Quality check items (attention / trap / instructional) that have a choice
  // set render as Likert (inline radios) so their layout matches regular scale
  // items. A check item with type single_choice would otherwise render stacked.
  if(checkItemIds.has(item.id)&&item.choice_set)return wrapItem(item,renderLikert(item,cs));
  if(t==='likert')        return wrapItem(item,renderLikert(item,cs));
  if(t==='single_choice') return wrapItem(item,renderSingle(item,cs));
  if(t==='multiple_choice')return wrapItem(item,renderMulti(item,cs));
  if(t==='matrix')        return wrapItem(item,renderMatrix(item,cs));
  if(t==='numeric')       return wrapItem(item,renderNumeric(item));
  if(t==='text')          return wrapItem(item,renderText(item));
  if(t==='textarea')      return wrapItem(item,renderTextarea(item));
  if(t==='date')          return wrapItem(item,renderDate(item));
  if(t==='slider')        return wrapItem(item,renderSlider(item));
  if(t==='rating')        return wrapItem(item,renderRating(item));
  if(t==='ranking')       return wrapItem(item,renderRanking(item,cs));
  return wrapItem(item,'<p style="color:var(--t3);font-size:12px">Unsupported item type: '+esc(t)+'</p>');
}

function renderSection(item){
  // The item_<id> wrapper lets branching rules show and hide section breaks
  return'<div class="blk'+(isVisible(item.id)?'':' hidden')+'" id="item_'+esc(item.id)+'">'
    +'<div class="sec-div"><h2 class="sec-title">'+esc(item.label)+'</h2>'
    +(item.section_intro?'<div class="sec-sub">'+esc(item.section_intro)+'</div>':'')+'</div></div>';
}
function renderTextBlock(item){
  // Branchable, so a text block can act as a screen-out or context message
  return'<div class="blk'+(isVisible(item.id)?'':' hidden')+'" id="item_'+esc(item.id)+'">'
    +'<div class="txt-blk">'+esc(item.label)+'</div></div>';
}
function renderLikert(item,cs){
  var saved=responses[item.id];
  return'<div class="likert-row" role="radiogroup" aria-labelledby="q_'+esc(item.id)+'">'+cs.values.map(function(v,i){
    var checked=String(saved)===String(v);
    return'<label class="likert-opt"><input type="radio" name="'+esc(item.id)+'" value="'+esc(v)+'"'+(checked?' checked':'')
      +(item.required?' aria-required="true"':'')
      +' onchange="setResp(\''+esc(item.id)+'\',this.value)">'
      +'<span class="likert-num">'+esc(v)+'</span>'
      +'<span class="likert-lbl">'+esc(cs.labels[i]||v)+'</span></label>';
  }).join('')+'</div>';
}
function renderSingle(item,cs){
  var saved=responses[item.id];
  return'<div class="choice-list">'+cs.values.map(function(v,i){
    var checked=String(saved)===String(v);
    return'<label class="choice-opt"><input type="radio" name="'+esc(item.id)+'" value="'+esc(v)+'"'
      +(checked?' checked':'')+(item.required?' aria-required="true"':'')
      +' onchange="setResp(\''+esc(item.id)+'\',this.value)">'
      +'<span class="opt-txt">'+esc(cs.labels[i]||v)+'</span></label>';
  }).join('')+'</div>';
}
function renderMulti(item,cs){
  var saved=(responses[item.id]||'').split(',').filter(Boolean);
  return'<div class="choice-list">'+cs.values.map(function(v,i){
    var chk=saved.includes(String(v));
    return'<label class="choice-opt"><input type="checkbox" name="'+esc(item.id)+'" value="'+esc(v)+'"'
      +(chk?' checked':'')+(item.required?' aria-required="true"':'')
      +' onchange="toggleMulti(\''+esc(item.id)+'\',this)">'
      +'<span class="opt-txt">'+esc(cs.labels[i]||v)+'</span></label>';
  }).join('')+'</div>';
}
function renderMatrix(item,cs){
  var rows=item.matrix_items||[];
  var hdr='<tr><th></th>'+cs.labels.map(function(l){return'<th>'+esc(l)+'</th>';}).join('')+'</tr>';
  var body=rows.map(function(row){
    var rowKey=item.id+'__'+row;
    var saved=responses[rowKey];
    return'<tr>'
      +'<td class="rl">'+esc(row)+'</td>'
      +cs.values.map(function(v){
        var colLbl=cs.labels[cs.values.indexOf(v)]||v;
        return'<td><input type="radio" name="'+esc(rowKey)+'" value="'+esc(v)+'"'
          +(String(saved)===String(v)?' checked':'')
          +' aria-label="'+esc(row)+': '+esc(colLbl)+'"'
          +' onchange="setResp(\''+esc(rowKey)+'\',this.value)"></td>';
      }).join('')
      +'</tr>';
  }).join('');
  return'<div class="matrix-wrap"><table class="matrix-tbl"><thead>'+hdr+'</thead><tbody>'+body+'</tbody></table></div>';
}
function renderNumeric(item){
  var saved=responses[item.id]||'';
  // slider_min/slider_max double as hard bounds for numeric entry; values
  // typed outside the range are clamped on change.
  // Numbers bypass esc(): esc(0) would collapse to an empty string
  var mn=item.slider_min!=null?' min="'+(+item.slider_min)+'"':'';
  var mx=item.slider_max!=null?' max="'+(+item.slider_max)+'"':'';
  return'<input type="number" class="inp-std inp-narrow" id="inp_'+esc(item.id)+'" value="'+esc(saved)+'"'+mn+mx+ariaFor(item)
    +' onchange="if(this.min!==\'\'&&+this.value<+this.min)this.value=this.min;'
    +'if(this.max!==\'\'&&+this.value>+this.max)this.value=this.max;'
    +'setResp(\''+esc(item.id)+'\',this.value)">';
}
function renderText(item){
  var saved=responses[item.id]||'';
  return'<input type="text" class="inp-std" id="inp_'+esc(item.id)+'" value="'+esc(saved)+'"'+ariaFor(item)
    +' placeholder="'+esc(item.placeholder||'')+'"'
    +' oninput="setResp(\''+esc(item.id)+'\',this.value)">';
}
function renderTextarea(item){
  var saved=responses[item.id]||'';
  return'<textarea class="inp-std" id="inp_'+esc(item.id)+'"'+ariaFor(item)+' placeholder="'+esc(item.placeholder||'')+'"'
    +' oninput="setResp(\''+esc(item.id)+'\',this.value)">'+esc(saved)+'</textarea>';
}
function renderDate(item){
  var saved=responses[item.id]||'';
  return'<input type="date" class="inp-std inp-narrow" id="inp_'+esc(item.id)+'" value="'+esc(saved)+'"'+ariaFor(item)
    +' onchange="setResp(\''+esc(item.id)+'\',this.value)">';
}
function renderSlider(item){
  var mn=item.slider_min!=null?item.slider_min:0;
  var mx=item.slider_max!=null?item.slider_max:100;
  var st=item.slider_step||1;
  var saved=responses[item.id]!=null?responses[item.id]:Math.round((mn+mx)/2);
  return'<div class="slider-wrap">'
    +'<div class="slider-val" id="slv_'+esc(item.id)+'">'+saved+'</div>'
    +'<input type="range" class="slider-inp"'+ariaFor(item)+' min="'+mn+'" max="'+mx+'" step="'+st+'" value="'+saved+'"'
    +' oninput="setResp(\''+esc(item.id)+'\',this.value);document.getElementById(\'slv_'+esc(item.id)+'\').textContent=this.value">'
    +'<div class="slider-lbls"><span>'+(+mn)+'</span><span>'+(+mx)+'</span></div>'
    +'</div>';
}
function renderRating(item){
  var mx=item.rating_max||5;
  var icon=item.rating_icon==='heart'?'&#10084;':'&#9733;';
  var saved=parseInt(responses[item.id])||0;
  var stars='';
  for(var i=1;i<=mx;i++){
    stars+='<button type="button" class="star-btn'+(i<=saved?' active':'')+'" data-id="'+esc(item.id)+'" data-v="'+i+'"'
      +' onclick="setRating(\''+esc(item.id)+'\','+i+','+mx+')"'
      +' aria-label="'+i+' of '+mx+'">'+icon+'</button>';
  }
  return'<div class="star-row" id="stars_'+esc(item.id)+'">'+stars+'</div>';
}
function renderRanking(item,cs){
  if(!rankOrders[item.id]){
    rankOrders[item.id]=cs.values.map(function(v,i){return{v:String(v),l:cs.labels[i]||String(v)};});
  }
  var order=rankOrders[item.id];
  return'<div class="rank-list" id="rank_'+esc(item.id)+'" ondragover="event.preventDefault()">'+order.map(function(opt,i){
    return'<div class="rank-item" draggable="true" data-id="'+esc(item.id)+'" data-v="'+esc(opt.v)+'"'
      +' ondragstart="rankDragStart(event)" ondragover="rankDragOver(event)" ondrop="rankDrop(event,\''+esc(item.id)+'\')" ondragleave="this.classList.remove(\'drag-over\')">'
      +'<span class="rank-num">'+(i+1)+'</span>'
      +'<span class="rank-handle" aria-hidden="true">&#8942;</span>'
      +'<span class="rank-lbl">'+esc(opt.l)+'</span>'
      +'<span class="rank-kbd">'
      +'<button type="button" class="rank-mv" aria-label="Move '+esc(opt.l)+' up"'
      +' onclick="rankMove(\''+esc(item.id)+'\',\''+esc(opt.v)+'\',-1)">&#9650;</button>'
      +'<button type="button" class="rank-mv" aria-label="Move '+esc(opt.l)+' down"'
      +' onclick="rankMove(\''+esc(item.id)+'\',\''+esc(opt.v)+'\',1)">&#9660;</button>'
      +'</span>'
      +'</div>';
  }).join('')+'</div>';
}

// ── Response handlers ──────────────────────────────────────────────────────
function setResp(id,val){
  responses[id]=val;
  var err=document.getElementById('err_'+id);
  if(err)err.classList.remove('show');
  updateBranching();
}
function toggleMulti(id,cb){
  var current=(responses[id]||'').split(',').filter(Boolean);
  if(cb.checked){if(!current.includes(cb.value))current.push(cb.value);}
  else{current=current.filter(function(v){return v!==cb.value;});}
  responses[id]=current.join(',');
  var err=document.getElementById('err_'+id);
  if(err)err.classList.remove('show');
  updateBranching();
}
function setRating(id,val,max){
  responses[id]=String(val);
  var err=document.getElementById('err_'+id);
  if(err)err.classList.remove('show');
  var btns=document.querySelectorAll('.star-btn[data-id="'+id+'"]');
  btns.forEach(function(b){b.classList.toggle('active',parseInt(b.dataset.v)<=val);});
  updateProgress();
}
function updateBranching(){
  SF.items.forEach(function(item){
    var el=document.getElementById('item_'+item.id);
    if(!el)return;
    el.classList.toggle('hidden',!isVisible(item.id));
  });
  updateProgress();
}

// ── Ranking drag-and-drop ─────────────────────────────────────────────────
var dragSrc=null;
function rankDragStart(e){
  dragSrc=e.currentTarget;
  e.currentTarget.classList.add('dragging');
}
function rankDragOver(e){
  e.preventDefault();
  document.querySelectorAll('.rank-item.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  e.currentTarget.classList.add('drag-over');
}
function rankDrop(e,itemId){
  e.preventDefault();
  if(!dragSrc||dragSrc===e.currentTarget)return;
  e.currentTarget.classList.remove('drag-over');
  dragSrc.classList.remove('dragging');
  var list=document.getElementById('rank_'+itemId);
  var items=[].slice.call(list.querySelectorAll('.rank-item'));
  var srcIdx=items.indexOf(dragSrc);
  var tgtIdx=items.indexOf(e.currentTarget);
  if(srcIdx>tgtIdx)list.insertBefore(dragSrc,e.currentTarget);
  else list.insertBefore(dragSrc,e.currentTarget.nextSibling);
  // Update numbers
  [].slice.call(list.querySelectorAll('.rank-item')).forEach(function(el,i){
    el.querySelector('.rank-num').textContent=i+1;
  });
  // Persist order
  var newOrder=[].slice.call(list.querySelectorAll('.rank-item')).map(function(el){return el.dataset.v;});
  responses[itemId]=newOrder.join(',');
  dragSrc=null;
}
// Keyboard alternative to drag: move an option one position up or down
function rankMove(itemId,v,dir){
  var order=rankOrders[itemId]; if(!order)return;
  var i=order.findIndex(function(o){return o.v===String(v);});
  var j=i+dir;
  if(i<0||j<0||j>=order.length)return;
  var tmp=order[i];order[i]=order[j];order[j]=tmp;
  responses[itemId]=order.map(function(o){return o.v;}).join(',');
  renderScreen();
  var btn=document.querySelector('#rank_'+itemId+' .rank-item[data-v="'+v+'"] .rank-mv'+(dir<0?'':' + .rank-mv'));
  if(btn)btn.focus();
}

// ── Validation ─────────────────────────────────────────────────────────────
function validatePage(items){
  var ok=true;
  items.forEach(function(item){
    if(!item.required||!isVisible(item.id))return;
    var t=item.type;
    var missing=false;
    if(t==='matrix'){
      (item.matrix_items||[]).forEach(function(row){
        var key=item.id+'__'+row;
        if(!responses[key]||responses[key]==='')missing=true;
      });
    } else if(t==='multiple_choice'){
      var v=responses[item.id];
      if(!v||v==='')missing=true;
    } else {
      var v2=responses[item.id];
      if(v2===null||v2===undefined||String(v2).trim()==='')missing=true;
    }
    if(missing){
      var err=document.getElementById('err_'+item.id);
      if(err){err.textContent='This question is required.';err.classList.add('show');}
      if(ok){
        var el=document.getElementById('item_'+item.id);
        if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      }
      ok=false;
    }
  });
  var banner=document.getElementById('survey-err');
  if(banner)banner.classList.toggle('show',!ok);
  return ok;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function startSurvey(){
  if(WL.consent_required){
    var chk=document.getElementById('consent-chk');
    if(!chk||!chk.checked){
      var err=document.getElementById('consent-err');
      if(err){err.textContent='Please confirm your consent before continuing.';err.classList.add('show');}
      return;
    }
  }
  screen='survey';
  currentPage=1;
  renderScreen();
}
function nextPage(){
  var items=pages[currentPage-1]||[];
  if(!validatePage(items))return;
  if(currentPage>=maxPage){doSubmit();return;}
  currentPage++;
  renderScreen();
  window.scrollTo({top:0,behavior:'smooth'});
}
function prevPage(){
  if(currentPage<=1)return;
  currentPage--;
  renderScreen();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Submission ─────────────────────────────────────────────────────────────
function doSubmit(){
  var submittedAt=new Date().toISOString();
  // Fix C: use respondent_id to match Apps Script header and read_responses()
  var row={respondent_id:respId,started_at:startedAt,submitted_at:submittedAt};
  SF.items.forEach(function(item){
    if(item.type==='section_break'||item.type==='text_block')return;
    if(!isVisible(item.id))return;
    if(item.type==='matrix'){
      (item.matrix_items||[]).forEach(function(r){
        var key=item.id+'__'+r;
        row[key]=responses[key]||'';
      });
    } else if(item.type==='ranking'){
      // One column per option holding its rank (1 = top), so the data is
      // directly analysable without reshaping.
      var cs=choiceMap[item.choice_set]||{values:[]};
      var order=(responses[item.id]||'').split(',').filter(Boolean);
      if(!order.length&&rankOrders[item.id]){
        order=rankOrders[item.id].map(function(o){return o.v;});
      }
      (cs.values||[]).forEach(function(v){
        var pos=order.indexOf(String(v));
        row[item.id+'__'+String(v)]=pos>=0?String(pos+1):'';
      });
    } else {
      row[item.id]=responses[item.id]!=null?responses[item.id]:'';
    }
  });
  var csvStr=toCsv([row]);
  downloadCsv(csvStr,(SF.meta.title||'survey')+'_response_'+respId+'.csv');
  if(ENDPOINT){
    // no-cors with a text/plain body: an application/json header triggers a
    // CORS preflight that Google Apps Script never answers, so the POST is
    // silently blocked in real deployments. Apps Script parses the body
    // regardless of content type.
    fetch(ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(row)})
      .catch(function(){});
  }
  screen='thankyou';
  renderScreen();
  var wrap=document.getElementById('prog-bar-wrap');
  if(wrap)wrap.hidden=true;
}
function toCsv(rows){
  if(!rows.length)return'';
  var keys=Object.keys(rows[0]);
  var lines=[keys.map(csvCell).join(',')];
  rows.forEach(function(r){lines.push(keys.map(function(k){return csvCell(r[k]);}).join(','));});
  return lines.join('\r\n');
}
function csvCell(v){
  var s=String(v==null?'':v);
  if(s.includes(',')||s.includes('"')||s.includes('\n'))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}
function downloadCsv(csv,name){
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=name;a.click();
}

// ── Screen rendering ───────────────────────────────────────────────────────
function renderScreen(){
  updateProgress();
  if(screen==='welcome')renderWelcome();
  else if(screen==='survey')renderSurvey();
  else renderThankyou();
}
function updateProgress(){
  var wrap=document.getElementById('prog-bar-wrap');
  var bar=document.getElementById('progBar');
  var pct=document.getElementById('progPct');
  var title=document.getElementById('progTitle');
  if(!wrap)return;
  // Honour the show-progress toggle. Multi-page surveys report page
  // position; single-page surveys report answered visible questions so a
  // long mobile survey still gives progress feedback.
  var showProg=!(R.header&&R.header.show_progress===false);
  if(screen!=='survey'||!showProg){wrap.hidden=true;return;}
  var p,label;
  if(maxPage>1){
    p=Math.round((currentPage/maxPage)*100);
    label='Page '+currentPage+' of '+maxPage;
  }else{
    var total=0,done=0;
    SF.items.forEach(function(item){
      if(item.type==='section_break'||item.type==='text_block')return;
      if(!isVisible(item.id))return;
      total++;
      if(item.type==='matrix'){
        var rows=item.matrix_items||[];
        var complete=rows.length>0&&rows.every(function(r){
          var v=responses[item.id+'__'+r];
          return v!=null&&v!=='';
        });
        if(complete)done++;
      }else{
        var v=responses[item.id];
        if(v!=null&&v!=='')done++;
      }
    });
    if(total===0){wrap.hidden=true;return;}
    p=Math.round((done/total)*100);
    label=done+' of '+total+' answered';
  }
  wrap.hidden=false;
  if(bar)bar.style.width=p+'%';
  if(pct)pct.textContent=p+'%';
  // Conversational mode already shows a per-question eyebrow, so the sticky
  // header carries the survey title instead of repeating the page counter.
  if(title)title.textContent=MODE==='conversational'?(SF.meta.title||''):label;
}
function renderWelcome(){
  var el=document.getElementById('app');
  if(!WL.intro_text&&!WL.consent_text&&!SF.meta.description){
    startSurvey();return;
  }
  el.innerHTML='<div class="card"><div class="card-body">'
    +'<h1 class="wl-title">'+esc(WL.title||SF.meta.title)+'</h1>'
    +(WL.intro_text?'<div class="wl-intro">'+esc(WL.intro_text)+'</div>':'')
    +(WL.consent_text?'<div class="consent-box">'+esc(WL.consent_text)+'</div>':'')
    +(WL.consent_required?'<label class="consent-chk"><input type="checkbox" id="consent-chk" style="accent-color:var(--cp)"><span>I have read and consent to participate.</span></label>':'')
    +'<div class="item-err" id="consent-err" style="margin-bottom:12px"></div>'
    +'<button type="button" class="btn btn-p btn-lg" onclick="startSurvey()">'+esc(WL.start_label||'Start Survey')+'</button>'
    +'</div></div>';
}
function renderSurvey(){
  var el=document.getElementById('app');
  var items=pages[currentPage-1]||[];
  var nav='<div class="nav-row">'
    +(currentPage>1?'<button type="button" class="btn btn-s" onclick="prevPage()">&#8592; Back</button>':'')
    +'<div class="sp"></div>'
    +(currentPage<maxPage
      ?'<button type="button" class="btn btn-p" onclick="nextPage()">Next &#8594;</button>'
      :'<button type="button" class="btn btn-p" onclick="nextPage()">'+esc(R.submit_label||'Submit')+'</button>')
    +'</div>';
  // The sticky bar already reports page position in standard mode, so the
  // in-card eyebrow appears only in conversational mode.
  var paginationInfo=MODE==='conversational'
    ?'<div class="q-eyebrow">Question '+currentPage+' of '+maxPage+'</div>'
    :'';
  el.innerHTML='<div class="card"><div class="card-body">'
    +(currentPage===1?'<h1 class="wl-title" style="margin-bottom:6px">'+esc(SF.meta.title)+'</h1>'+(SF.meta.description?'<div style="color:var(--t2);font-size:14px;line-height:1.55;margin-bottom:22px">'+esc(SF.meta.description)+'</div>':''):'')
    +paginationInfo
    +'<div id="survey-err" class="err-banner">Please answer all required questions before continuing.</div>'
    +items.map(renderItem).join('')
    +nav
    +'</div></div>';
  // Restore multi-checkbox and slider states (already handled via re-render)
}
function renderThankyou(){
  var el=document.getElementById('app');
  el.innerHTML='<div class="card"><div class="card-body">'
    +'<div class="ty-ic">&#10004;</div>'
    +'<div class="ty-title">Thank You</div>'
    +'<div class="ty-msg">'+esc(TY.message||'Your response has been recorded. Thank you for participating.')+'</div>'
    +(TY.show_download?'<button type="button" class="btn btn-s" style="margin:0 auto;display:flex" onclick="window.location.reload()">Submit another response</button>':'')
    +'</div></div>';
}

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  renderScreen();
});
</script>
