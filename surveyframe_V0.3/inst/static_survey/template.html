<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{SURVEY_TITLE}}</title>
<style>
:root{
  --cp:{{THEME_COLOR}};
  --cf:#ffffff;--cg:#f4f6fb;--cb:#e2e8f0;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;
  --cd:#dc2626;--cs:#16a34a;
  --font:system-ui,-apple-system,"Segoe UI",sans-serif;
  --r:10px;--card-w:640px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--cg);font-family:var(--font);font-size:14px;color:var(--t1);line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea,select{font-family:inherit;font-size:14px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* Progress */
.prog-bar-wrap{position:sticky;top:0;z-index:50;background:var(--cf);border-bottom:1px solid var(--cb);padding:0}
.prog-bar-inner{height:4px;background:var(--cp);transition:width .3s ease;min-width:0}
.prog-hdr{display:flex;align-items:center;gap:10px;padding:10px 20px}
.prog-title{font-size:13px;font-weight:600;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-pct{font-size:11px;color:var(--t3);flex-shrink:0}

/* Layout */
.frame{max-width:var(--card-w);margin:0 auto;padding:28px 16px 60px}
.card{background:var(--cf);border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden}
.card-body{padding:32px}

/* Welcome / thankyou */
.wl-title{font-size:24px;font-weight:700;margin-bottom:8px}
.wl-intro{color:var(--t2);margin-bottom:20px;white-space:pre-wrap}
.consent-box{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:8px;padding:14px 16px;font-size:13px;color:#1e40af;margin-bottom:16px;white-space:pre-wrap}
.consent-chk{display:flex;align-items:flex-start;gap:8px;font-size:13px;margin-bottom:20px;cursor:pointer}
.consent-chk input{margin-top:3px;accent-color:var(--cp)}
.ty-ic{font-size:52px;text-align:center;margin-bottom:14px}
.ty-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}
.ty-msg{color:var(--t2);text-align:center;font-size:14px;margin-bottom:22px;white-space:pre-wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;
  transition:all .15s;border:2px solid transparent;cursor:pointer}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--cp);color:#fff;border-color:var(--cp)}
.btn-p:hover:not(:disabled){filter:brightness(.92)}
.btn-s{background:var(--cf);color:var(--t1);border-color:var(--cb)}
.btn-s:hover:not(:disabled){background:var(--cg)}
.btn-lg{padding:13px 30px;font-size:15px;width:100%;margin-top:24px}
.nav-row{display:flex;gap:10px;margin-top:24px}
.nav-row .sp{flex:1}

/* Section / text block */
.sec-div{border-top:3px solid var(--cp);margin:28px 0 20px;padding-top:18px}
.sec-title{font-size:18px;font-weight:700}
.sec-sub{color:var(--t2);font-size:13px;margin-top:4px;white-space:pre-wrap}
.txt-blk{background:#eff6ff;border-left:4px solid var(--cp);border-radius:0 8px 8px 0;
  padding:12px 16px;margin:14px 0;font-size:13px;color:#1e40af;white-space:pre-wrap}

/* Items */
.item{margin-bottom:24px}
.item.hidden{display:none}
.item-q{font-weight:600;margin-bottom:8px;display:flex;gap:6px;font-size:14px}
.req-mk{color:var(--cd);font-size:11px;margin-top:2px;flex-shrink:0}
.item-help{font-size:12px;color:var(--t3);margin-bottom:8px;margin-top:-4px}
.item-err{font-size:12px;color:var(--cd);margin-top:5px;display:none}
.item-err.show{display:block}

/* Likert (inline radios) */
.likert-row{display:flex;gap:0;overflow-x:auto}
.likert-opt{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:8px 4px;border-radius:6px;cursor:pointer;transition:background .12s;text-align:center}
.likert-opt:hover{background:var(--cg)}
.likert-opt input{accent-color:var(--cp)}
.likert-lbl{font-size:11px;color:var(--t2);line-height:1.3;max-width:72px}

/* Choice (stacked) */
.choice-opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
  border-radius:6px;cursor:pointer;transition:background .12s;font-size:13px}
.choice-opt:hover{background:var(--cg)}
.choice-opt input{margin-top:2px;accent-color:var(--cp);flex-shrink:0}

/* Short text / number / date */
.inp-std{width:100%;border:1.5px solid var(--cb);border-radius:8px;
  padding:9px 12px;font-size:14px;color:var(--t1);background:var(--cf);
  transition:border-color .15s,box-shadow .15s}
.inp-std:focus{outline:none;border-color:var(--cp);box-shadow:0 0 0 3px color-mix(in srgb,var(--cp) 15%,transparent)}
textarea.inp-std{resize:vertical;min-height:80px}
.inp-narrow{max-width:220px}

/* Slider */
.slider-wrap{display:flex;flex-direction:column;gap:6px}
.slider-inp{width:100%;accent-color:var(--cp);height:6px;cursor:pointer}
.slider-lbls{display:flex;justify-content:space-between;font-size:11px;color:var(--t3)}
.slider-val{font-size:13px;font-weight:600;color:var(--cp);text-align:center}

/* Rating */
.star-row{display:flex;gap:4px}
.star-btn{font-size:28px;background:none;border:none;cursor:pointer;
  color:var(--cb);transition:color .12s;line-height:1}
.star-btn.active{color:var(--cp)}

/* Matrix */
.matrix-wrap{overflow-x:auto;margin-top:6px}
.matrix-tbl{width:100%;border-collapse:collapse;font-size:12px}
.matrix-tbl th{background:var(--cg);padding:7px 10px;text-align:center;
  border:1px solid var(--cb);font-weight:600;vertical-align:bottom}
.matrix-tbl td{padding:7px 10px;border:1px solid var(--cb);text-align:center;vertical-align:middle}
.matrix-tbl .rl{text-align:left;font-weight:500}
.matrix-tbl input{accent-color:var(--cp)}
.matrix-tbl tr:nth-child(even) td{background:#fafbfd}

/* Ranking */
.rank-list{border:1.5px solid var(--cb);border-radius:8px;overflow:hidden}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--cf);border-bottom:1px solid var(--cb);cursor:grab;
  user-select:none;transition:background .12s}
.rank-item:last-child{border-bottom:none}
.rank-item:hover{background:var(--cg)}
.rank-item.drag-over{border-top:2px solid var(--cp)}
.rank-item.dragging{opacity:.4}
.rank-num{width:20px;height:20px;border-radius:9999px;background:var(--cp);
  color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-handle{color:var(--t3);font-size:13px;flex-shrink:0}
.rank-lbl{flex:1;font-size:13px}

/* Error banner */
.err-banner{background:#fef2f2;border:1.5px solid #fecaca;border-radius:8px;
  padding:12px 16px;margin-bottom:18px;font-size:13px;color:#991b1b;display:none}
.err-banner.show{display:block}
</style>
</head>
<body data-endpoint="{{ENDPOINT_URL}}">

<div id="prog-bar-wrap" class="prog-bar-wrap" hidden>
  <div class="prog-bar-inner" id="progBar" style="width:0%"></div>
  <div class="prog-hdr">
    <span class="prog-title" id="progTitle">{{SURVEY_TITLE}}</span>
    <span class="prog-pct" id="progPct">0%</span>
  </div>
</div>

<div class="frame" id="app"></div>

<script type="application/json" id="sf-data">{{INSTRUMENT_JSON}}</script>
<script>
'use strict';
const SF       = JSON.parse(document.getElementById('sf-data').textContent);
const R        = (SF.render||{});
const THEME    = R.theme||'{{THEME_COLOR}}'||'#2563eb';
const ENDPOINT = document.body.dataset.endpoint||'';
const MODE     = R.mode||'standard';
const WL       = R.welcome||{};
const TY       = R.thankyou||{};

// Apply theme color
document.documentElement.style.setProperty('--cp', THEME);

// ── Lookups ────────────────────────────────────────────────────────────────
const choiceMap={};
(SF.choices||[]).forEach(function(cs){choiceMap[cs.id]=cs;});

const branchMap={};
(SF.branching||[]).forEach(function(rule){branchMap[rule.item_id]=rule;});

// ── Response state ─────────────────────────────────────────────────────────
const responses={};
const startedAt=new Date().toISOString();
const respId='R'+Math.random().toString(36).slice(2,10).toUpperCase();
let screen='welcome';
let currentPage=1;
let rankOrders={};
let starValues={};

// ── Page builder ───────────────────────────────────────────────────────────
function buildPages(){
  if(MODE==='conversational'){
    return SF.items.map(function(i){return[i];});
  }
  var pagesMap={};
  SF.items.forEach(function(item){
    var p=item.page||1;
    if(!pagesMap[p])pagesMap[p]=[];
    pagesMap[p].push(item);
  });
  var keys=Object.keys(pagesMap).map(Number).sort(function(a,b){return a-b;});
  if(!keys.length)return[SF.items];
  return keys.map(function(k){return pagesMap[k];});
}
const pages=buildPages();
const maxPage=pages.length;

// ── Branching ──────────────────────────────────────────────────────────────
function evaluate(op,actual,value){
  if(actual===null||actual===undefined||actual==='')return false;
  var an=parseFloat(actual),vn=parseFloat(value);
  switch(op){
    case'==':return String(actual)===String(value);
    case'!=':return String(actual)!==String(value);
    case'%in%':return value.split(',').map(function(s){return s.trim();}).includes(String(actual));
    case'>': return !isNaN(an)&&!isNaN(vn)&&an>vn;
    case'>=':return !isNaN(an)&&!isNaN(vn)&&an>=vn;
    case'<': return !isNaN(an)&&!isNaN(vn)&&an<vn;
    case'<=':return !isNaN(an)&&!isNaN(vn)&&an<=vn;
    default:return false;
  }
}
function isVisible(itemId){
  var rule=branchMap[itemId];
  if(!rule)return true;
  var actual=responses[rule.depends_on];
  var cond=evaluate(rule.operator,actual,rule.value);
  return rule.action==='show'?cond:!cond;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function h(tag,attrs,inner){return'<'+tag+' '+(attrs||'')+'>'+inner+'</'+tag+'>';}
function wrapItem(item,inner){
  return'<div class="item'+(isVisible(item.id)?'':' hidden')+'" id="item_'+esc(item.id)+'" data-id="'+esc(item.id)+'">'
    +'<div class="item-q">'+esc(item.label)+(item.required?'<span class="req-mk" aria-hidden="true">*</span>':'')+'</div>'
    +(item.help?'<div class="item-help">'+esc(item.help)+'</div>':'')
    +inner
    +'<div class="item-err" id="err_'+esc(item.id)+'">This question is required.</div>'
    +'</div>';
}

// ── Renderers ──────────────────────────────────────────────────────────────
function renderItem(item){
  var t=item.type;
  var cs=choiceMap[item.choice_set||'']||{values:[],labels:[]};
  if(t==='section_break') return renderSection(item);
  if(t==='text_block')    return renderTextBlock(item);
  if(t==='likert')        return wrapItem(item,renderLikert(item,cs));
  if(t==='single_choice') return wrapItem(item,renderSingle(item,cs));
  if(t==='multiple_choice')return wrapItem(item,renderMulti(item,cs));
  if(t==='matrix')        return wrapItem(item,renderMatrix(item,cs));
  if(t==='numeric')       return wrapItem(item,renderNumeric(item));
  if(t==='text')          return wrapItem(item,renderText(item));
  if(t==='textarea')      return wrapItem(item,renderTextarea(item));
  if(t==='date')          return wrapItem(item,renderDate(item));
  if(t==='slider')        return wrapItem(item,renderSlider(item));
  if(t==='rating')        return wrapItem(item,renderRating(item));
  if(t==='ranking')       return wrapItem(item,renderRanking(item,cs));
  return wrapItem(item,'<p style="color:var(--t3);font-size:12px">Unsupported item type: '+esc(t)+'</p>');
}

function renderSection(item){
  return'<div class="sec-div"><div class="sec-title">'+esc(item.label)+'</div>'+(item.section_intro?'<div class="sec-sub">'+esc(item.section_intro)+'</div>':'')+'</div>';
}
function renderTextBlock(item){
  return'<div class="txt-blk">'+esc(item.label)+'</div>';
}
function renderLikert(item,cs){
  var saved=responses[item.id];
  return'<div class="likert-row" role="radiogroup">'+cs.values.map(function(v,i){
    var checked=String(saved)===String(v);
    return'<label class="likert-opt"><input type="radio" name="'+esc(item.id)+'" value="'+esc(v)+'"'+(checked?' checked':'')
      +' onchange="setResp(\''+esc(item.id)+'\',this.value)">'
      +'<span class="likert-lbl">'+esc(cs.labels[i]||v)+'</span></label>';
  }).join('')+'</div>';
}
function renderSingle(item,cs){
  var saved=responses[item.id];
  return cs.values.map(function(v,i){
    var checked=String(saved)===String(v);
    return'<label class="choice-opt"><input type="radio" name="'+esc(item.id)+'" value="'+esc(v)+'"'
      +(checked?' checked':'')
      +' onchange="setResp(\''+esc(item.id)+'\',this.value)">'
      +esc(cs.labels[i]||v)+'</label>';
  }).join('');
}
function renderMulti(item,cs){
  var saved=(responses[item.id]||'').split(',').filter(Boolean);
  return cs.values.map(function(v,i){
    var chk=saved.includes(String(v));
    return'<label class="choice-opt"><input type="checkbox" name="'+esc(item.id)+'" value="'+esc(v)+'"'
      +(chk?' checked':'')
      +' onchange="toggleMulti(\''+esc(item.id)+'\',this)">'
      +esc(cs.labels[i]||v)+'</label>';
  }).join('');
}
function renderMatrix(item,cs){
  var rows=item.matrix_items||[];
  var hdr='<tr><th></th>'+cs.labels.map(function(l){return'<th>'+esc(l)+'</th>';}).join('')+'</tr>';
  var body=rows.map(function(row){
    var rowKey=item.id+'__'+row;
    var saved=responses[rowKey];
    return'<tr>'
      +'<td class="rl">'+esc(row)+'</td>'
      +cs.values.map(function(v){
        return'<td><input type="radio" name="'+esc(rowKey)+'" value="'+esc(v)+'"'
          +(String(saved)===String(v)?' checked':'')
          +' onchange="setResp(\''+esc(rowKey)+'\',this.value)"></td>';
      }).join('')
      +'</tr>';
  }).join('');
  return'<div class="matrix-wrap"><table class="matrix-tbl"><thead>'+hdr+'</thead><tbody>'+body+'</tbody></table></div>';
}
function renderNumeric(item){
  var saved=responses[item.id]||'';
  return'<input type="number" class="inp-std inp-narrow" id="inp_'+esc(item.id)+'" value="'+esc(saved)+'"'
    +' onchange="setResp(\''+esc(item.id)+'\',this.value)">';
}
function renderText(item){
  var saved=responses[item.id]||'';
  return'<input type="text" class="inp-std" id="inp_'+esc(item.id)+'" value="'+esc(saved)+'"'
    +' placeholder="'+esc(item.placeholder||'')+'"'
    +' oninput="setResp(\''+esc(item.id)+'\',this.value)">';
}
function renderTextarea(item){
  var saved=responses[item.id]||'';
  return'<textarea class="inp-std" id="inp_'+esc(item.id)+'" placeholder="'+esc(item.placeholder||'')+'"'
    +' oninput="setResp(\''+esc(item.id)+'\',this.value)">'+esc(saved)+'</textarea>';
}
function renderDate(item){
  var saved=responses[item.id]||'';
  return'<input type="date" class="inp-std inp-narrow" id="inp_'+esc(item.id)+'" value="'+esc(saved)+'"'
    +' onchange="setResp(\''+esc(item.id)+'\',this.value)">';
}
function renderSlider(item){
  var mn=item.slider_min!=null?item.slider_min:0;
  var mx=item.slider_max!=null?item.slider_max:100;
  var st=item.slider_step||1;
  var saved=responses[item.id]!=null?responses[item.id]:Math.round((mn+mx)/2);
  return'<div class="slider-wrap">'
    +'<div class="slider-val" id="slv_'+esc(item.id)+'">'+saved+'</div>'
    +'<input type="range" class="slider-inp" min="'+mn+'" max="'+mx+'" step="'+st+'" value="'+saved+'"'
    +' oninput="setResp(\''+esc(item.id)+'\',this.value);document.getElementById(\'slv_'+esc(item.id)+'\').textContent=this.value">'
    +'<div class="slider-lbls"><span>'+esc(mn)+'</span><span>'+esc(mx)+'</span></div>'
    +'</div>';
}
function renderRating(item){
  var mx=item.rating_max||5;
  var icon=item.rating_icon==='heart'?'&#10084;':'&#9733;';
  var saved=parseInt(responses[item.id])||0;
  var stars='';
  for(var i=1;i<=mx;i++){
    stars+='<button type="button" class="star-btn'+(i<=saved?' active':'')+'" data-id="'+esc(item.id)+'" data-v="'+i+'"'
      +' onclick="setRating(\''+esc(item.id)+'\','+i+','+mx+')"'
      +' aria-label="'+i+' of '+mx+'">'+icon+'</button>';
  }
  return'<div class="star-row" id="stars_'+esc(item.id)+'">'+stars+'</div>';
}
function renderRanking(item,cs){
  if(!rankOrders[item.id]){
    rankOrders[item.id]=cs.values.map(function(v,i){return{v:String(v),l:cs.labels[i]||String(v)};});
  }
  var order=rankOrders[item.id];
  return'<div class="rank-list" id="rank_'+esc(item.id)+'" ondragover="event.preventDefault()">'+order.map(function(opt,i){
    return'<div class="rank-item" draggable="true" data-id="'+esc(item.id)+'" data-v="'+esc(opt.v)+'"'
      +' ondragstart="rankDragStart(event)" ondragover="rankDragOver(event)" ondrop="rankDrop(event,\''+esc(item.id)+'\')" ondragleave="this.classList.remove(\'drag-over\')">'
      +'<span class="rank-num">'+(i+1)+'</span>'
      +'<span class="rank-handle">&#8942;</span>'
      +'<span class="rank-lbl">'+esc(opt.l)+'</span>'
      +'</div>';
  }).join('')+'</div>';
}

// ── Response handlers ──────────────────────────────────────────────────────
function setResp(id,val){
  responses[id]=val;
  var err=document.getElementById('err_'+id);
  if(err)err.classList.remove('show');
  updateBranching();
}
function toggleMulti(id,cb){
  var current=(responses[id]||'').split(',').filter(Boolean);
  if(cb.checked){if(!current.includes(cb.value))current.push(cb.value);}
  else{current=current.filter(function(v){return v!==cb.value;});}
  responses[id]=current.join(',');
  var err=document.getElementById('err_'+id);
  if(err)err.classList.remove('show');
  updateBranching();
}
function setRating(id,val,max){
  responses[id]=String(val);
  var err=document.getElementById('err_'+id);
  if(err)err.classList.remove('show');
  var btns=document.querySelectorAll('.star-btn[data-id="'+id+'"]');
  btns.forEach(function(b){b.classList.toggle('active',parseInt(b.dataset.v)<=val);});
}
function updateBranching(){
  SF.items.forEach(function(item){
    var el=document.getElementById('item_'+item.id);
    if(!el)return;
    el.classList.toggle('hidden',!isVisible(item.id));
  });
}

// ── Ranking drag-and-drop ─────────────────────────────────────────────────
var dragSrc=null;
function rankDragStart(e){
  dragSrc=e.currentTarget;
  e.currentTarget.classList.add('dragging');
}
function rankDragOver(e){
  e.preventDefault();
  document.querySelectorAll('.rank-item.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  e.currentTarget.classList.add('drag-over');
}
function rankDrop(e,itemId){
  e.preventDefault();
  if(!dragSrc||dragSrc===e.currentTarget)return;
  e.currentTarget.classList.remove('drag-over');
  dragSrc.classList.remove('dragging');
  var list=document.getElementById('rank_'+itemId);
  var items=[].slice.call(list.querySelectorAll('.rank-item'));
  var srcIdx=items.indexOf(dragSrc);
  var tgtIdx=items.indexOf(e.currentTarget);
  if(srcIdx>tgtIdx)list.insertBefore(dragSrc,e.currentTarget);
  else list.insertBefore(dragSrc,e.currentTarget.nextSibling);
  // Update numbers
  [].slice.call(list.querySelectorAll('.rank-item')).forEach(function(el,i){
    el.querySelector('.rank-num').textContent=i+1;
  });
  // Persist order
  var newOrder=[].slice.call(list.querySelectorAll('.rank-item')).map(function(el){return el.dataset.v;});
  responses[itemId]=newOrder.join(',');
  dragSrc=null;
}

// ── Validation ─────────────────────────────────────────────────────────────
function validatePage(items){
  var ok=true;
  items.forEach(function(item){
    if(!item.required||!isVisible(item.id))return;
    var t=item.type;
    var missing=false;
    if(t==='matrix'){
      (item.matrix_items||[]).forEach(function(row){
        var key=item.id+'__'+row;
        if(!responses[key]||responses[key]==='')missing=true;
      });
    } else if(t==='multiple_choice'){
      var v=responses[item.id];
      if(!v||v==='')missing=true;
    } else {
      var v2=responses[item.id];
      if(v2===null||v2===undefined||String(v2).trim()==='')missing=true;
    }
    if(missing){
      var err=document.getElementById('err_'+item.id);
      if(err){err.textContent='This question is required.';err.classList.add('show');}
      if(ok){
        var el=document.getElementById('item_'+item.id);
        if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      }
      ok=false;
    }
  });
  return ok;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function startSurvey(){
  if(WL.consent_required){
    var chk=document.getElementById('consent-chk');
    if(!chk||!chk.checked){
      var err=document.getElementById('consent-err');
      if(err){err.textContent='Please confirm your consent before continuing.';err.classList.add('show');}
      return;
    }
  }
  screen='survey';
  currentPage=1;
  renderScreen();
}
function nextPage(){
  var items=pages[currentPage-1]||[];
  if(!validatePage(items))return;
  if(currentPage>=maxPage){doSubmit();return;}
  currentPage++;
  renderScreen();
  window.scrollTo({top:0,behavior:'smooth'});
}
function prevPage(){
  if(currentPage<=1)return;
  currentPage--;
  renderScreen();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Submission ─────────────────────────────────────────────────────────────
function doSubmit(){
  var submittedAt=new Date().toISOString();
  var row={response_id:respId,started_at:startedAt,submitted_at:submittedAt};
  SF.items.forEach(function(item){
    if(!isVisible(item.id))return;
    if(item.type==='matrix'){
      (item.matrix_items||[]).forEach(function(r){
        var key=item.id+'__'+r;
        row[key]=responses[key]||'';
      });
    } else {
      row[item.id]=responses[item.id]!=null?responses[item.id]:'';
    }
  });
  var csvStr=toCsv([row]);
  downloadCsv(csvStr,(SF.meta.title||'survey')+'_response_'+respId+'.csv');
  if(ENDPOINT){
    fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(row)})
      .catch(function(){});
  }
  screen='thankyou';
  renderScreen();
  var wrap=document.getElementById('prog-bar-wrap');
  if(wrap)wrap.hidden=true;
}
function toCsv(rows){
  if(!rows.length)return'';
  var keys=Object.keys(rows[0]);
  var lines=[keys.map(csvCell).join(',')];
  rows.forEach(function(r){lines.push(keys.map(function(k){return csvCell(r[k]);}).join(','));});
  return lines.join('\r\n');
}
function csvCell(v){
  var s=String(v==null?'':v);
  if(s.includes(',')||s.includes('"')||s.includes('\n'))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}
function downloadCsv(csv,name){
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=name;a.click();
}

// ── Screen rendering ───────────────────────────────────────────────────────
function renderScreen(){
  updateProgress();
  if(screen==='welcome')renderWelcome();
  else if(screen==='survey')renderSurvey();
  else renderThankyou();
}
function updateProgress(){
  var wrap=document.getElementById('prog-bar-wrap');
  var bar=document.getElementById('progBar');
  var pct=document.getElementById('progPct');
  if(!wrap)return;
  if(screen!=='survey'){wrap.hidden=true;return;}
  wrap.hidden=false;
  var p=Math.round((currentPage/maxPage)*100);
  if(bar)bar.style.width=p+'%';
  if(pct)pct.textContent=p+'%';
}
function renderWelcome(){
  var el=document.getElementById('app');
  if(!WL.intro_text&&!WL.consent_text&&!SF.meta.description){
    startSurvey();return;
  }
  el.innerHTML='<div class="card"><div class="card-body">'
    +'<div class="wl-title">'+esc(WL.title||SF.meta.title)+'</div>'
    +(WL.intro_text?'<div class="wl-intro">'+esc(WL.intro_text)+'</div>':'')
    +(WL.consent_text?'<div class="consent-box">'+esc(WL.consent_text)+'</div>':'')
    +(WL.consent_required?'<label class="consent-chk"><input type="checkbox" id="consent-chk" style="accent-color:var(--cp)"><span>I have read and consent to participate.</span></label>':'')
    +'<div class="item-err" id="consent-err" style="margin-bottom:12px"></div>'
    +'<button type="button" class="btn btn-p btn-lg" onclick="startSurvey()">'+esc(WL.start_label||'Start Survey')+'</button>'
    +'</div></div>';
}
function renderSurvey(){
  var el=document.getElementById('app');
  var items=pages[currentPage-1]||[];
  var nav='<div class="nav-row">'
    +(currentPage>1?'<button type="button" class="btn btn-s" onclick="prevPage()">&#8592; Back</button>':'')
    +'<div class="sp"></div>'
    +(currentPage<maxPage
      ?'<button type="button" class="btn btn-p" onclick="nextPage()">Next &#8594;</button>'
      :'<button type="button" class="btn btn-p" onclick="nextPage()">'+esc(R.submit_label||'Submit')+'</button>')
    +'</div>';
  var paginationInfo=maxPage>1?'<div style="font-size:11px;color:var(--t3);margin-bottom:14px">Page '+currentPage+' of '+maxPage+'</div>':'';
  el.innerHTML='<div class="card"><div class="card-body">'
    +(currentPage===1?'<div style="font-size:20px;font-weight:700;margin-bottom:4px">'+esc(SF.meta.title)+'</div>'+(SF.meta.description?'<div style="color:var(--t2);font-size:13px;margin-bottom:20px">'+esc(SF.meta.description)+'</div>':''):'')
    +paginationInfo
    +'<div id="survey-err" class="err-banner">Please answer all required questions before continuing.</div>'
    +items.map(renderItem).join('')
    +nav
    +'</div></div>';
  // Restore multi-checkbox and slider states (already handled via re-render)
}
function renderThankyou(){
  var el=document.getElementById('app');
  el.innerHTML='<div class="card"><div class="card-body">'
    +'<div class="ty-ic">&#10004;</div>'
    +'<div class="ty-title">Thank You</div>'
    +'<div class="ty-msg">'+esc(TY.message||'Your response has been recorded. Thank you for participating.')+'</div>'
    +(TY.show_download?'<button type="button" class="btn btn-s" style="margin:0 auto;display:flex" onclick="window.location.reload()">Submit another response</button>':'')
    +'</div></div>';
}

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  renderScreen();
});
</script>
</body>
</html>
