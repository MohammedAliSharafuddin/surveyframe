url: https://mohammedalisharafuddin.github.io/surveyframe

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#0B3A78"
    secondary: "#16B3B1"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

# man/figures/logo.png is picked up automatically by pkgdown.
# Favicons are in pkgdown/favicons/ and picked up by pkgdown >= 2.0.

home:
  title: "surveyframe"
  description: >
    Survey instrument workflows for R.
    Define instruments, design them visually, deploy surveys,
    check data quality, score scales, run psychometric diagnostics,
    and generate reproducible reports from one source object.
  links:
    - text: SurveyBuilder
      href: reference/launch_builder.html
    - text: SurveyStudio interface
      href: articles/surveyframe.html
    - text: GitHub repository
      href: https://github.com/MohammedAliSharafuddin/surveyframe
    - text: Report a bug
      href: https://github.com/MohammedAliSharafuddin/surveyframe/issues

navbar:
  title: "surveyframe"
  left:
    - text: "Get started"
      href: articles/surveyframe.html
    - text: "Reference"
      href: reference/index.html
    - text: "Changelog"
      href: news/index.html
  right:
    - icon: fa-github
      href: https://github.com/MohammedAliSharafuddin/surveyframe
      aria-label: GitHub

reference:
  - title: "Design"
    desc: >
      Start visually in the HTML SurveyBuilder or construct instruments in R.
    contents:
      - launch_builder
      - launch_builder_demo
      - launch_studio_demo
      - launch_dashboard_demo

  - title: "Build an instrument"
    desc: >
      Constructor functions for building the sframe instrument object.
      Start here.
    contents:
      - sf_instrument
      - sf_item
      - sf_choices
      - sf_scale
      - sf_branch
      - sf_check
      - sf_model
      - sf_construct
      - sf_path
      - sf_covariance
      - sf_indirect
      - add_model

  - title: "Save and load"
    desc: >
      Read and write instruments as portable .sframe JSON files with
      SHA-256 integrity hashing.
    contents:
      - write_sframe
      - read_sframe
      - validate_sframe
      - validate_model
      - model_json

  - title: "Deploy"
    desc: >
      Render the instrument as a Shiny survey or launch SurveyStudio.
    contents:
      - render_survey
      - export_static_survey
      - launch_studio
      - launch_dashboard
      - survey_module_ui
      - survey_module_server

  - title: "Collect responses"
    desc: >
      Load and validate response data against the instrument specification.
    contents:
      - read_responses
      - export_google_sheet
      - read_sheet_responses

  - title: "Quality checks"
    desc: >
      Evaluate response data for attention check failures, straight-lining,
      missingness, and duplicate submissions.
    contents:
      - quality_report
      - missing_data_report
      - outlier_report
      - assumption_report

  - title: "Score and analyse"
    desc: >
      Score composite scales, compute reliability statistics, and prepare
      psychometric diagnostics and pre-planned analyses.
    contents:
      - score_scales
      - descriptives_report
      - reliability_report
      - item_report
      - efa_report
      - efa_solution
      - validity_report
      - cfa_syntax
      - cfa_lavaan_syntax
      - efa_syntax
      - sem_lavaan_syntax
      - seminr_syntax
      - posthoc_report
      - sample_size_plan
      - run_analysis_plan

  - title: "Report"
    desc: >
      Generate codebooks, scale appendices, and reproducible HTML reports.
    contents:
      - codebook_report
      - render_report
      - render_results
      - model_report_template

  - title: "Package"
    contents:
      - surveyframe-package
      - sframe_demo_data
      - sframe_input_types_demo_data
      - sframe_builder_empty_state
      - sframe_builder_state_from_instrument
      - sframe_builder_validate_draft
      - print.sframe
      - format.sframe
      - summary.sframe

footer:
  structure:
    left: [developed_by, built_with]
    right: [package]
  components:
    package: >
      surveyframe is an open-source R package for survey research.
      MIT License.
